<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Bigwin959</title>
    <meta name="robots" content="noindex, follow">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #030712;
            /* gray-950 */
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 42rem;
            width: 100%;
            padding: 1rem;
            text-align: center;
        }

        .hero {
            position: relative;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 150px;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            color: #111827;
            /* gray-900 */
        }

        .badge-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge {
            background-color: #FFD700;
            /* brand */
            color: black;
            font-weight: 900;
            font-size: 1.5rem;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            transform: rotate(-5deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        h2 {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
        }

        p {
            color: #9ca3af;
            /* gray-400 */
            font-size: 1.125rem;
            margin-bottom: 3rem;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 640px) {
            .buttons {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 700;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #FFD700;
            color: black;
        }

        .btn-primary:hover {
            background-color: white;
        }

        .btn-secondary {
            background-color: #1f2937;
            color: white;
            border: 1px solid #374151;
        }

        .btn-secondary:hover {
            background-color: #374151;
        }

        .footer {
            border-top: 1px solid #1f2937;
            padding-top: 2rem;
            margin-top: 2rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .footer-link {
            color: #FFD700;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-link:hover {
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1>404</h1>
            <div class="badge-container">
                <div class="badge">OOPS!</div>
            </div>
        </div>

        <h2>Looks like you're lost!</h2>
        <p>The page you are looking for is not available or has been moved.</p>

        <div class="buttons">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Return Home
            </a>
            <a href="/guides" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                </svg>
                View Guides
            </a>
        </div>

        <div class="footer">
            <p style="margin-bottom: 1rem; font-size: 1rem; color: #6b7280;">Need immediate help?</p>
            <div class="footer-links">
                <a href="/contact" class="footer-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    Contact Support
                </a>
            </div>
        </div>
    </div>
</body>

</html>
